<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maddix Portal v2</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <h1>Maddix Portal</h1>
      <p class="subtitle">Deploy WhatsApp bots with ease</p>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('register')">Register</button>
      </div>

      <form id="login-form" class="auth-form active" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" required placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" required placeholder="••••••">
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>

      <form id="register-form" class="auth-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="register-username" required placeholder="username" minlength="3">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="register-email" required placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="register-password" required placeholder="••••••" minlength="6">
        </div>
        <div class="form-group">
          <label>Referral Code (Optional)</label>
          <input type="text" id="register-referral" placeholder="ABC123">
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
